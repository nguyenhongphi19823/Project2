# tên workflow hiển thị trên tab Actions của GitHub
name: Python Playwright Tests

# điều kiện chạy workflow
on:
  # chạy khi push code lên branch master
  push:
    # danh sách branch được trigger
    branches:
      # branch master của repo bạn
      - master

  # chạy khi tạo pull request vào branch master
  pull_request:
    # danh sách branch target
    branches:
      # branch master của repo bạn
      - master

  # cho phép chạy thủ công bằng nút Run workflow trên GitHub
  workflow_dispatch:

# danh sách job trong workflow
jobs:
  # tên job
  test:
    # chạy trên máy ảo Ubuntu mới nhất của GitHub
    runs-on: ubuntu-latest

    # các bước chạy trong job
    steps:
      # bước 1: checkout source code từ repo
      - name: Checkout code
        # dùng action checkout để lấy code về runner
        uses: actions/checkout@v4

      # bước 2: cài Python
      - name: Set up Python
        # dùng action setup-python để cài Python vào runner
        uses: actions/setup-python@v5
        # cấu hình cho setup-python
        with:
          # version Python muốn dùng
          python-version: "3.12"

      # bước 3: cài dependencies Python
      - name: Install Python dependencies
        # chạy nhiều command shell
        run: |
          # nâng cấp pip
          python -m pip install --upgrade pip
          # cài package từ requirements.txt
          python -m pip install -r requirements.txt

      # bước 4: cài browser và system dependencies cho Playwright
      - name: Install Playwright browsers
        # cài browser kèm Linux dependencies cần thiết
        run: |
          # cài browser và dependencies cho CI Linux
          python -m playwright install --with-deps

        # bước 5: chạy smoke test
      - name: Run smoke tests
        # truyền biến môi trường vào test
        env:
          # base url lấy từ GitHub Secret
          DP360_BASE_URL: ${{ secrets.DP360_BASE_URL }}

          # username lấy từ GitHub Secret
          DP360_USERNAME: ${{ secrets.DP360_USERNAME }}

          # password lấy từ GitHub Secret
          DP360_PASSWORD: ${{ secrets.DP360_PASSWORD }}

          # chạy headless trên CI
          HEADLESS: "true"

          # dùng chromium trên CI
          BROWSER: "chromium"

        # command chạy smoke test
        run: |
          # tạo folder reports nếu chưa có
          mkdir -p reports

        # chạy only smoke test và tạo report HTML
          python -m pytest -m smoke -v --tb=short --html=reports/smoke-report.html --self-contained-html

      # bước 6: upload report/log khi chạy xong
      - name: Upload test artifacts
        # luôn chạy bước này dù test pass hay fail
        if: always()
        # dùng action upload-artifact để lưu file kết quả
        uses: actions/upload-artifact@v4
        # cấu hình artifact
        with:
          # tên artifact trên GitHub Actions
          name: test-artifacts
          # các folder/file cần upload
          path: |
            reports/
            logs/
            screenshots/
            videos/
            traces/
            allure-results/