  # chạy khi push lên branch master
  push:
    # danh sách branch được trigger
    branches:
      # branch master của repo bạn
      - master

  # chạy khi có pull request vào master
  pull_request:
    # danh sách branch target
    branches:
      # branch master của repo bạn
      - master

  # chạy tự động theo lịch
  schedule:
    # chạy mỗi ngày lúc 00:00 UTC, tức 07:00 sáng Việt Nam
    - cron: "0 0 * * *"

  # cho phép chạy thủ công bằng nút Run workflow
  workflow_dispatch:

# tên workflow hiển thị trong tab Actions
name: Python Playwright Tests

# điều kiện chạy workflow
on:
  # chạy khi push code lên branch master
  push:
    # danh sách branch được trigger
    branches:
      # branch master của repo
      - master

  # chạy khi tạo pull request vào master
  pull_request:
    # danh sách branch target
    branches:
      # branch master của repo
      - master

  # chạy thủ công và cho phép nhập option
  workflow_dispatch:
    # danh sách input khi bấm Run workflow
    inputs:
      # input chọn browser
      browser:
        # mô tả hiển thị trên GitHub UI
        description: "Browser to run"
        # bắt buộc phải chọn browser
        required: true
        # giá trị mặc định
        default: "chromium"
        # kiểu lựa chọn dropdown
        type: choice
        # danh sách lựa chọn
        options:
          # chọn Chromium
          - chromium
          # chọn Firefox
          - firefox
          # chọn WebKit
          - webkit

      # input chọn loại test
      test_type:
        # mô tả hiển thị trên GitHub UI
        description: "Test type to run"
        # bắt buộc phải chọn test type
        required: true
        # giá trị mặc định
        default: "smoke"
        # kiểu lựa chọn dropdown
        type: choice
        # danh sách lựa chọn
        options:
          # chạy smoke test
          - smoke
          # chạy regression test
          - regression

      # input chọn headless
      headless:
        # mô tả hiển thị trên GitHub UI
        description: "Run headless"
        # bắt buộc phải chọn headless
        required: true
        # giá trị mặc định
        default: "true"
        # kiểu lựa chọn dropdown
        type: choice
        # danh sách lựa chọn
        options:
          # chạy không mở giao diện browser
          - "true"
          # chạy có mở giao diện browser
          - "false"

# danh sách job trong workflow
jobs:
  # job smoke test
  smoke:
    # chạy trên máy ảo Ubuntu mới nhất
    runs-on: ubuntu-latest

    # cấu hình matrix
    strategy:
      # không hủy browser khác nếu một browser fail
      fail-fast: false

      # danh sách biến matrix
      matrix:
        # chạy trên 3 browser
        browser: [chromium, firefox, webkit]

    # tên job hiển thị theo từng browser
    name: Smoke tests - ${{ matrix.browser }}

    # danh sách step
    steps:
      # lấy source code từ repo
      - name: Checkout code
        uses: actions/checkout@v4

      # cài Python
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          # version Python dùng trong CI
          python-version: "3.12"

      # cài Python dependencies
      - name: Install Python dependencies
        run: |
          # nâng cấp pip
          python -m pip install --upgrade pip

          # cài thư viện từ requirements.txt
          python -m pip install -r requirements.txt

      # cài browser cho Playwright
      - name: Install Playwright browsers
        run: |
          # cài browser và dependencies Linux
          python -m playwright install --with-deps

      # chạy smoke test
      - name: Run smoke tests
        env:
          # base url lấy từ GitHub Secrets
          DP360_BASE_URL: ${{ secrets.DP360_BASE_URL }}

          # username lấy từ GitHub Secrets
          DP360_USERNAME: ${{ secrets.DP360_USERNAME }}

          # password lấy từ GitHub Secrets
          DP360_PASSWORD: ${{ secrets.DP360_PASSWORD }}

          # CI nên chạy headless
          HEADLESS: "true"

          # browser lấy từ matrix
          BROWSER: ${{ matrix.browser }}

        run: |
          # tạo folder reports nếu chưa có
          mkdir -p reports

          # chạy smoke test theo browser hiện tại trong matrix
          python -m pytest -m smoke -v --tb=short --browser ${{ matrix.browser }} --headless true --html=reports/smoke-${{ matrix.browser }}-report.html --self-contained-html

      # upload artifact sau khi test chạy xong
      - name: Upload test artifacts
        # luôn chạy bước upload dù test pass hay fail
        if: always()
        # dùng GitHub action upload-artifact version 4
        uses: actions/upload-artifact@v4
        # cấu hình artifact
        with:
          # tên artifact có kèm browser hiện tại trong matrix
          name: smoke-artifacts-${{ matrix.browser }}
          # danh sách file/folder cần lưu lại
          path: |
            reports/
            logs/
            screenshots/
            videos/
            traces/
            
            
