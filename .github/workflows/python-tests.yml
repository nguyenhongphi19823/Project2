# tên workflow hiển thị trên GitHub Actions
name: Python Playwright Smoke Tests

# điều kiện chạy workflow
on:
  # chạy khi push lên branch master
  push:
    # danh sách branch được trigger
    branches:
      # branch master của repo
      - master

  # chạy khi tạo pull request vào branch master
  pull_request:
    # danh sách branch target
    branches:
      # branch master của repo
      - master

  # cho phép chạy thủ công từ GitHub UI
  workflow_dispatch:

# danh sách job
jobs:
  # job chạy smoke test
  smoke:
    # máy ảo Ubuntu mới nhất
    runs-on: ubuntu-latest

    # cấu hình matrix
    strategy:
      # không dừng toàn bộ matrix nếu 1 browser fail
      fail-fast: false

      # danh sách biến matrix
      matrix:
        # chạy test trên 3 browser
        browser: [chromium, firefox, webkit]

    # tên job hiển thị trên GitHub Actions
    name: Smoke tests - ${{ matrix.browser }}

    # danh sách step
    steps:
      # lấy source code từ GitHub repo
      - name: Checkout code
        uses: actions/checkout@v4

      # cài Python
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          # dùng Python 3.12
          python-version: "3.12"

      # cài Python dependencies
      - name: Install Python dependencies
        run: |
          # nâng cấp pip
          python -m pip install --upgrade pip

          # cài thư viện từ requirements.txt
          python -m pip install -r requirements.txt

      # cài browser Playwright
      - name: Install Playwright browsers
        run: |
          # cài browser và Linux dependencies cho Playwright
          python -m playwright install --with-deps

      # chạy smoke test
      - name: Run smoke tests
        env:
          # base URL lấy từ GitHub Secrets
          DP360_BASE_URL: ${{ secrets.DP360_BASE_URL }}

          # username lấy từ GitHub Secrets
          DP360_USERNAME: ${{ secrets.DP360_USERNAME }}

          # password lấy từ GitHub Secrets
          DP360_PASSWORD: ${{ secrets.DP360_PASSWORD }}

          # trên CI nên chạy headless
          HEADLESS: "true"

          # browser lấy từ matrix
          BROWSER: ${{ matrix.browser }}

        run: |
          # tạo folder reports nếu chưa có
          mkdir -p reports

          # chạy smoke test và tạo report riêng theo browser
          python -m pytest -m smoke -v --tb=short --browser ${{ matrix.browser }} --headless true --html=reports/smoke-${{ matrix.browser }}-report.html --self-contained-html

      # upload report/log/screenshot/video/trace
      - name: Upload test artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          # tên artifact có kèm browser
          name: smoke-artifacts-${{ matrix.browser }}

          # danh sách folder cần upload
          path: |
            reports/
            logs/
            screenshots/
            videos/
            traces/